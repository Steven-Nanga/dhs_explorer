services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dhs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DHS_DB_HOST: db
      DHS_DB_PASSWORD: changeme
      DHS_SECRET: change-this-to-a-random-string
      DHS_PASSWORD: admin
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  pgdata:
