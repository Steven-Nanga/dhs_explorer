<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — DHS Explorer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { max-width: 400px; width: 100%; border: none; border-radius: 18px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    .login-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
  </style>
</head>
<body>
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div class="login-icon bg-primary bg-opacity-10 text-primary mx-auto mb-3">
        <i class="bi bi-database-fill"></i>
      </div>
      <h4 class="fw-bold mb-1">DHS Explorer</h4>
      <p class="text-muted small mb-0">Enter the password to continue</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password" autofocus required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
      </button>
    </form>

    <p class="text-muted text-center small mt-3 mb-0">
      Default password: <code>admin</code>
      <br>Set <code>DHS_PASSWORD</code> env var to change.
    </p>
  </div>
</body>
</html>
