<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DHS Data Explorer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column flex-shrink-0 p-3">
    <a href="/" class="sidebar-brand d-flex align-items-center mb-3 text-decoration-none">
      <i class="bi bi-database-fill me-2 fs-4"></i>
      <span class="fs-5 fw-semibold">DHS Explorer</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a href="/" class="nav-link {{ 'active' if request.path == '/' }}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="/upload" class="nav-link {{ 'active' if request.path.startswith('/upload') }}">
          <i class="bi bi-cloud-arrow-up me-2"></i>Upload Data
        </a>
      </li>
      <li class="nav-item">
        <a href="/explore" class="nav-link {{ 'active' if request.path.startswith('/explore') }}">
          <i class="bi bi-folder2-open me-2"></i>Explore Data
        </a>
      </li>
      <li class="nav-item">
        <a href="/search" class="nav-link {{ 'active' if request.path.startswith('/search') }}">
          <i class="bi bi-search me-2"></i>Search Variables
        </a>
      </li>
      <li class="nav-item">
        <a href="/analysis" class="nav-link {{ 'active' if request.path.startswith('/analysis') }}">
          <i class="bi bi-calculator me-2"></i>Analysis
        </a>
      </li>
      <li class="nav-item">
        <a href="/compare" class="nav-link {{ 'active' if request.path.startswith('/compare') }}">
          <i class="bi bi-arrow-left-right me-2"></i>Compare Waves
        </a>
      </li>
    </ul>
    <hr>
    <div class="sidebar-footer small">
      <i class="bi bi-globe2 me-1"></i> DHS Survey Database
    </div>
  </nav>

  <!-- Main -->
  <main class="main-content flex-grow-1">
    <div class="container-fluid p-4">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
